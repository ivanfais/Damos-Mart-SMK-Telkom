# Laptop ~7GB RAM: keep Gradle heap modest so the daemon does not OOM-crash.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.workers.max=2
org.gradle.parallel=true
org.gradle.daemon=true
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Workaround: Kotlin incremental cache fails when project (D:) and pub cache (C:) are on different drives.
kotlin.incremental=false
