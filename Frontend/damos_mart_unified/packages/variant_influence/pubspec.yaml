name: variant_influence
publish_to: none
description: Damos Mart School Cooperative Mobile Client - Influence DISC Personality Design.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  disc_core:
    path: ../disc_core

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Routing
  go_router: ^13.2.0

  # Networking & WebSockets
  dio: ^5.4.1
  socket_io_client: ^3.0.2

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI & Design System
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  qr_flutter: ^4.1.0
  fl_chart: ^0.66.0
  shimmer: ^3.0.0
  flutter_local_notifications: ^17.0.0
  image_picker: ^1.0.7

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/images/logo damos.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo damos.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
