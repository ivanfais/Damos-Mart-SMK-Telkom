name: damos_mart_unified
description: Damos Mart unified mobile client — all DISC personality variants in one app.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  disc_core:
    path: packages/disc_core
  variant_conscientiousness:
    path: packages/variant_conscientiousness
  variant_influence:
    path: packages/variant_influence
  variant_dominance:
    path: packages/variant_dominance
  variant_steadiness:
    path: packages/variant_steadiness

  flutter_bloc: ^8.1.3
  go_router: ^13.2.0
  intl: ^0.19.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  image: ^4.8.0

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  macos:
    generate: true
  windows:
    generate: true
  # Pakai versi kotak dari logo asli (logo di tengah, rasio dijaga, padding
  # transparan) supaya logo tampil UTUH tanpa gepeng/terpotong.
  image_path: "assets/images/logo_damos_mart_square.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
